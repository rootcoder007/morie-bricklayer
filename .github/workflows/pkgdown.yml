name: pkgdown
on:
  push:
    branches: [main]
    paths: ['bricklayer/**', '.github/workflows/pkgdown.yml']
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: pkgdown-${{ github.ref }}
  cancel-in-progress: false
jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bricklayer
          extra-packages: any::pkgdown, any::roxygen2
          needs: website
      - name: Roxygenise
        run: roxygen2::roxygenise("bricklayer")
        shell: Rscript {0}
      - name: Build site
        run: pkgdown::build_site_github_pages(pkg = "bricklayer", new_process = FALSE, install = TRUE)
        shell: Rscript {0}
      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: bricklayer/docs
