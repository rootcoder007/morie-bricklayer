# CI for morie-bricklayer: lint the shell scripts and run the canonical
# build-and-verify smoke test (builds the otis-mrp bundle, then runs the
# bundle's setup_and_run.R --quick, which auto-installs its R deps).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run shellcheck (errors only)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y shellcheck
          # Fail only on genuine errors; style warnings are advisory.
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 -r shellcheck --severity=error

  smoke-test:
    name: build + verify otis-mrp bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: r-lib/actions/setup-r@2e3959d284a9ed60162f28a0f9891d1150f47f72 # v2
        with:
          use-public-rspm: true

      - name: Build and verify the otis-mrp bundle
        run: ./tests/test_build_otis.sh
